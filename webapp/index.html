<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GPT Plus • Claude Pro | Shop</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #1a1a2e);
    color: var(--tg-theme-text-color, #ffffff);
    min-height: 100vh;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 20px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
    text-decoration: none;
    color: #fff;
  }

  .btn:active {
    transform: scale(0.97);
    opacity: 0.85;
  }

  .btn-primary {
    background: linear-gradient(135deg, #2ea6d1, #1b8ab5);
    font-size: 16px;
    padding: 16px 20px;
  }

  .btn-green {
    background: linear-gradient(135deg, #4CAF50, #388E3C);
  }

  .btn-purple {
    background: linear-gradient(135deg, #7c4dff, #6200ea);
  }

  .btn-orange {
    background: linear-gradient(135deg, #FF9800, #F57C00);
  }

  .btn-gray {
    background: var(--tg-theme-secondary-bg-color, #2d2d44);
    color: var(--tg-theme-text-color, #ccc);
  }

  .btn-info {
    background: linear-gradient(135deg, #546e7a, #37474f);
  }

  .row {
    display: flex;
    gap: 10px;
  }

  .row .btn {
    flex: 1;
    min-width: 0;
  }

  .emoji {
    font-size: 20px;
    line-height: 1;
  }

  .footer {
    margin-top: auto;
    text-align: center;
    font-size: 12px;
    color: var(--tg-theme-hint-color, #888);
    padding: 10px 0;
  }
</style>
</head>
<body>

<button class="btn btn-primary" onclick="send('pay')">
  <span class="emoji">🪙</span> Купить подписку
</button>

<div class="row">
  <button class="btn btn-green" onclick="send('instructions')">
    <span class="emoji">❗</span> Инструкция
  </button>
  <button class="btn btn-green" onclick="send('my_subs')">
    <span class="emoji">📂</span> Мои подписки
  </button>
</div>

<button class="btn btn-purple" onclick="send('referral')">
  <span class="emoji">👥</span> Реферальная программа
</button>

<button class="btn btn-orange" onclick="send('prompts')">
  <span class="emoji">ℹ️</span> Полезные промты
</button>

<div class="row">
  <button class="btn btn-gray" onclick="openUrl('https://t.me/GPTSubsReviews')">
    <span class="emoji">⭐</span> Отзывы
  </button>
  <button class="btn btn-gray" onclick="send('help')">
    <span class="emoji">💡</span> Помощь
  </button>
</div>

<button class="btn btn-info" onclick="send('info')">
  <span class="emoji">ℹ️</span> Информация
</button>

<div class="footer">GPT Plus • Claude Pro | Shop</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  function send(action) {
    tg.sendData(JSON.stringify({ action }));
  }

  function openUrl(url) {
    tg.openTelegramLink(url);
    tg.close();
  }
</script>
</body>
</html>
